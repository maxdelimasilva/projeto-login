<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="estilos/style.css">
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
                <img src="" alt="">
            </div>
            <div id="formulário">
                <h1>Login</h1>
                <p>Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder as configurações no seu ambiente.</p>
                <form action="login.php" method="post" autocomplete="on">
                    <label for="iemail">Email</label>
                    <input type="email" name="email" id="iemail" required>
                    
                    <label for="isenha">Senha</label>
                    <input type="password" name="senha" id="isenha" required>

                    <button type="submit">Entrar</button>
                    <button type="submit">Esqueci a senha</button>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
