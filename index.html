<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media-query.css">
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
            </div>
            <div id="formulario">
                <h1>Login</h1>
                <p>Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder as configurações no seu ambiente.</p>
                <form action="login.php" method="post" autocomplete="on">
                    <div>
                        <label for="iemail">Email</label>
                        <input type="email" name="email" id="iemail" required>
                    </div>
                    
                    <div>
                        <label for="isenha">Senha</label>
                        <input type="password" name="senha" id="isenha" required>
                    </div>

                    <div>
                        <input type="submit" value="Entrar">
                    </div>

                    <div>
                        <input type="submit" value="Esqueci a senha">
                    </div>
           
                </form>
            </div>
        </section>
    </main>
</body>
</html>
